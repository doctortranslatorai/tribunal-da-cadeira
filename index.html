<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Path Auto</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  background:#02040a;
  color:white;
  font-family:Arial,sans-serif;
  min-height:100vh;
  overflow:hidden;
}

.app{
  width:100vw;
  height:100vh;
  max-width:430px;
  margin:auto;
  aspect-ratio:9/16;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:18px 12px;
  background:
    radial-gradient(circle at top,#18245a,#05070d 55%,#010208);
}

h1{
  font-size:36px;
  color:#7cff6b;
  text-shadow:0 0 18px #39ff14;
  margin-top:6px;
}

.sub{
  color:#00eaff;
  font-size:13px;
  margin:6px 0 12px;
  text-align:center;
}

.hud{
  width:100%;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:12px;
}

.card{
  border:1px solid #00eaff;
  padding:8px 5px;
  border-radius:12px;
  background:#07111d;
  box-shadow:0 0 12px #00eaff66;
  text-align:center;
  font-size:12px;
}

.card span{
  display:block;
  font-size:22px;
  color:#ffd400;
  margin-top:3px;
}

.objective{
  width:100%;
  border:1px solid #2eff71;
  border-radius:14px;
  padding:10px;
  background:#061019;
  font-size:13px;
  line-height:1.4;
  margin-bottom:12px;
}

.objective b{color:#ffd400}
.objective .green{color:#39ff14}
.objective .red{color:#ff3333}

.board{
  width:100%;
  max-width:390px;
  aspect-ratio:1/1;
  display:grid;
  grid-template-columns:repeat(12,1fr);
  grid-template-rows:repeat(12,1fr);
  gap:3px;
  padding:8px;
  background:#0b0f15;
  border:2px solid #2eff71;
  border-radius:18px;
  box-shadow:0 0 28px #2eff71aa;
}

.cell{
  width:100%;
  height:100%;
  background:#151b22;
  border-radius:6px;
  position:relative;
  box-shadow:inset 0 0 7px #000;
}

.wall{background:#333}
.wall::after{
  content:"✖";
  color:#777;
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
}

.coin::after{
  content:"";
  width:45%;
  height:45%;
  background:#ffd400;
  border-radius:50%;
  box-shadow:0 0 12px #ffd400;
  position:absolute;
  top:27%;
  left:27%;
}

.block{
  background:#5a0808;
  box-shadow:0 0 10px red;
}

.exit{
  background:#3a3200;
  box-shadow:0 0 14px #ffd400;
}

.exit::after{
  content:"★";
  color:#ffd400;
  font-size:20px;
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.player{
  background:#27ff53!important;
  box-shadow:0 0 22px #27ff53;
}

.player::after{
  content:"▶";
  color:#001b05;
  font-size:18px;
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.path{
  background:#103d18;
  box-shadow:0 0 12px #27ff53 inset;
}

.panel{
  width:100%;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:12px;
}

.info{
  border:1px solid #00eaff;
  border-radius:12px;
  padding:9px;
  background:#061019;
  font-size:12px;
  text-align:center;
}

.info strong{
  display:block;
  color:#ffd400;
  font-size:18px;
}

button{
  margin-top:12px;
  width:100%;
  padding:12px;
  border:0;
  border-radius:14px;
  background:#27ff53;
  color:#001b05;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 18px #27ff53;
}

.footer{
  margin-top:10px;
  color:#aaa;
  font-size:12px;
  text-align:center;
}
</style>
</head>

<body>

<div class="app">
  <h1>NEON PATH</h1>
  <div class="sub">Modo automático · observa a IA jogar</div>

  <div class="hud">
    <div class="card">Nível <span id="level">1</span></div>
    <div class="card">Esferas <span id="coins">0</span></div>
    <div class="card">Movimentos <span id="moves">0</span></div>
  </div>

  <div class="objective">
    Objetivo: sair do <span class="green">INÍCIO</span> até à <b>SAÍDA</b>, coletando esferas e evitando <span class="red">obstáculos</span>.
  </div>

  <div class="board" id="board"></div>

  <div class="panel">
    <div class="info">Tempo<strong id="time">00:00</strong></div>
    <div class="info">Recorde<strong id="record">--</strong></div>
  </div>

  <button onclick="restart()">REINICIAR</button>

  <div class="footer">Cada movimento conta. A estratégia é a chave.</div>
</div>

<script>
const size = 12;
let level = 1;
let moves = 0;
let coinsCollected = 0;
let player = {x:0,y:0};
let exit = {x:11,y:11};
let grid = [];
let autoTimer;
let timeTimer;
let seconds = 0;
let record = null;

function createLevel(){
  clearInterval(autoTimer);
  clearInterval(timeTimer);

  moves = 0;
  coinsCollected = 0;
  seconds = 0;
  player = {x:0,y:0};
  exit = {x:11,y:11};

  grid = Array.from({length:size},()=>Array(size).fill("empty"));

  grid[0][0] = "player";
  grid[11][11] = "exit";

  for(let i=0;i<20;i++){
    let x = Math.floor(Math.random()*size);
    let y = Math.floor(Math.random()*size);
    if(isSafe(x,y)) grid[y][x] = "wall";
  }

  for(let i=0;i<28;i++){
    let x = Math.floor(Math.random()*size);
    let y = Math.floor(Math.random()*size);
    if(grid[y][x] === "empty") grid[y][x] = "coin";
  }

  for(let i=0;i<7;i++){
    let x = Math.floor(Math.random()*size);
    let y = Math.floor(Math.random()*size);
    if(grid[y][x] === "empty") grid[y][x] = "block";
  }

  draw();
  startClock();
  autoPlay();
}

function isSafe(x,y){
  if((x===0 && y===0) || (x===11 && y===11)) return false;
  if(x<2 && y<2) return false;
  if(x>9 && y>9) return false;
  return grid[y][x] === "empty";
}

function draw(){
  const board = document.getElementById("board");
  board.innerHTML = "";

  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){
      const cell = document.createElement("div");
      cell.className = "cell";

      if(grid[y][x] === "wall") cell.classList.add("wall");
      if(grid[y][x] === "coin") cell.classList.add("coin");
      if(grid[y][x] === "block") cell.classList.add("block");
      if(grid[y][x] === "exit") cell.classList.add("exit");
      if(grid[y][x] === "path") cell.classList.add("path");
      if(player.x === x && player.y === y) cell.classList.add("player");

      board.appendChild(cell);
    }
  }

  document.getElementById("level").textContent = level;
  document.getElementById("coins").textContent = coinsCollected;
  document.getElementById("moves").textContent = moves;
  document.getElementById("record").textContent = record ? record + " mov." : "--";
}

function findBestMove(){
  const dirs = [
    {x:1,y:0},
    {x:0,y:1},
    {x:-1,y:0},
    {x:0,y:-1}
  ];

  let best = null;
  let bestScore = 9999;

  for(const d of dirs){
    let nx = player.x + d.x;
    let ny = player.y + d.y;

    if(nx<0 || ny<0 || nx>=size || ny>=size) continue;
    if(grid[ny][nx] === "wall" || grid[ny][nx] === "block") continue;

    let score = Math.abs(exit.x-nx) + Math.abs(exit.y-ny);

    if(grid[ny][nx] === "coin") score -= 6;
    if(grid[ny][nx] === "path") score += 3;

    if(score < bestScore){
      bestScore = score;
      best = {x:nx,y:ny};
    }
  }

  return best;
}

function step(){
  const move = findBestMove();

  if(!move){
    clearInterval(autoTimer);
    setTimeout(createLevel,700);
    return;
  }

  if(grid[move.y][move.x] === "coin"){
    coinsCollected++;
  }

  if(!(player.x === 0 && player.y === 0)){
    grid[player.y][player.x] = "path";
  }

  player = move;
  moves++;

  if(player.x === exit.x && player.y === exit.y){
    clearInterval(autoTimer);
    clearInterval(timeTimer);

    if(record === null || moves < record){
      record = moves;
    }

    setTimeout(()=>{
      level++;
      createLevel();
    },1000);
  }

  draw();
}

function autoPlay(){
  autoTimer = setInterval(step,260);
}

function startClock(){
  updateClock();
  timeTimer = setInterval(()=>{
    seconds++;
    updateClock();
  },1000);
}

function updateClock(){
  let m = String(Math.floor(seconds/60)).padStart(2,"0");
  let s = String(seconds%60).padStart(2,"0");
  document.getElementById("time").textContent = `${m}:${s}`;
}

function restart(){
  level = 1;
  record = null;
  createLevel();
}

createLevel();
</script>

</body>
</html>
