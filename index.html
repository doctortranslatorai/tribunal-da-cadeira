<script>
  const SUPABASE_URL = "https://aqwhsygerywuvmtpilsj.supabase.co/rest/v1";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxd2hzeWdlcnl3dXZtdHBpbHNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MzIwNTEsImV4cCI6MjA5NzEwODA1MX0.CrMBVFH737uCmj11mGTXjUR7cyFxJ35laxocs31YUNU";

  const verdicts = [
    "INOCENTE",
    "CULPADA",
    "CULPADO",
    "CONDENADO 300 ANOS",
    "SABIA DEMAIS",
    "SEM ALMA",
    "PECADO ORIGINAL",
    "PERIGOSO",
    "ABSOLVIDO POR ABSURDO"
  ];

  const motives = [
    "A cadeira ouviu silêncio suficiente para desconfiar.",
    "Sabia mais do que devia e fingiu que era decoração.",
    "Provocou confusão emocional em objetos inocentes.",
    "Mentiu ao tempo, ao espaço e provavelmente ao tapete.",
    "Carregava culpa antiga nos cantos invisíveis.",
    "Tentou parecer normal. Falhou.",
    "A sua existência levantou demasiadas perguntas.",
    "Não cometeu crime nenhum. Isso foi precisamente o problema.",
    "A cadeira não explicou. Apenas decidiu."
  ];

  let judgments = [];

  function showSection(id, element) {
    document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    document.querySelectorAll("nav a").forEach(a => a.classList.remove("active"));
    if (element) element.classList.add("active");

    if (id === "ranking") renderRanking();
  }

  function goToCreate() {
    const julgarLink = document.querySelectorAll("nav a")[1];
    showSection("julgar", julgarLink);
  }

  function getEmoji(category, title) {
    const t = title.toLowerCase();

    if (t.includes("banana")) return "🍌";
    if (t.includes("relógio") || t.includes("tempo")) return "⏰";
    if (t.includes("meia")) return "🧦";
    if (t.includes("copo") || t.includes("chávena") || t.includes("café")) return "☕";
    if (t.includes("urso") || t.includes("peluche")) return "🧸";
    if (t.includes("livro")) return "📖";
    if (category === "Memória") return "🕯️";
    if (category === "Filosófico") return "🧠";
    if (category === "Câmara da Morte") return "💀";

    return "🪑";
  }

  async function loadJudgments() {
    try {
      const response = await fetch(`${SUPABASE_URL}/judgments?select=*&order=created_at.desc`, {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`
        }
      });

      if (!response.ok) {
        throw new Error("Erro ao carregar julgamentos");
      }

      judgments = await response.json();
      renderFeed();
      renderRanking();
    } catch (error) {
      console.error(error);
      alert("A cadeira não conseguiu carregar os julgamentos.");
    }
  }

  async function createJudgment() {
    const title = document.getElementById("caseTitle").value.trim();
    const category = document.getElementById("caseCategory").value;
    const content = document.getElementById("caseText").value.trim();

    if (!title || !content) {
      alert("A cadeira exige título e descrição.");
      return;
    }

    const verdict = verdicts[Math.floor(Math.random() * verdicts.length)];
    const motive = motives[Math.floor(Math.random() * motives.length)];
    const emoji = getEmoji(category, title);

    const newJudgment = {
      title,
      category,
      content,
      emoji,
      verdict,
      motive,
      votes: Math.floor(Math.random() * 300) + 1
    };

    try {
      const response = await fetch(`${SUPABASE_URL}/judgments`, {
        method: "POST",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json",
          "Prefer": "return=representation"
        },
        body: JSON.stringify(newJudgment)
      });

      if (!response.ok) {
        throw new Error("Erro ao criar julgamento");
      }

      const saved = await response.json();

      document.getElementById("result").innerHTML = `
        <div class="card">
          <div class="object">${saved[0].emoji}</div>
          <div>
            <div class="meta">@Observador · agora · ${saved[0].category}</div>
            <h3>${saved[0].title}</h3>
            <p>${saved[0].content} ${saved[0].motive}</p>
          </div>
          <div class="verdict">${saved[0].verdict}</div>
          <div class="actions">
            <button class="action">Concordo</button>
            <button class="action">Recurso negado</button>
            <button class="action">Mandar para o Abismo</button>
            <button class="action">Partilhar</button>
          </div>
        </div>
      `;

      document.getElementById("caseTitle").value = "";
      document.getElementById("caseText").value = "";

      await loadJudgments();

    } catch (error) {
      console.error(error);
      alert("A cadeira recusou este julgamento.");
    }
  }

  function renderFeed() {
    const feed = document.getElementById("feedList");

    if (!judgments.length) {
      feed.innerHTML = `
        <div class="card">
          <div class="object">🪑</div>
          <div>
            <div class="meta">@Cadeira · agora</div>
            <h3>Nenhum julgamento encontrado</h3>
            <p>O tribunal está vazio. Submete o primeiro caso.</p>
          </div>
          <div class="verdict">À ESPERA</div>
        </div>
      `;
      return;
    }

    feed.innerHTML = judgments.map((j, index) => `
      <div class="card">
        <div class="object">${j.emoji || "🪑"}</div>
        <div>
          <div class="meta">@Observador · Caso nº ${index + 1} · ${j.category}</div>
          <h3>${j.title}</h3>
          <p>${j.content} ${j.motive || ""}</p>
        </div>
        <div class="verdict">${j.verdict}</div>
        <div class="actions">
          <button class="action" onclick="vote('${j.id}', ${j.votes || 0})">Concordo (${j.votes || 0})</button>
          <button class="action">Recurso negado</button>
          <button class="action">Mandar para o Abismo</button>
          <button class="action" onclick="shareJudgment(${index})">Partilhar</button>
        </div>
      </div>
    `).join("");
  }

  function renderRanking() {
    const ranking = document.getElementById("rankingList");
    const sorted = [...judgments].sort((a, b) => (b.votes || 0) - (a.votes || 0));

    ranking.innerHTML = sorted.map((j, index) => `
      <div class="ranking-card">
        <div class="ranking-item">
          <span>${index + 1}. ${j.emoji || "🪑"} ${j.title}</span>
          <strong>${j.votes || 0}</strong>
        </div>
        <p>${j.verdict}</p>
      </div>
    `).join("");
  }

  async function vote(id, currentVotes) {
    try {
      const response = await fetch(`${SUPABASE_URL}/judgments?id=eq.${id}`, {
        method: "PATCH",
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": `Bearer ${SUPABASE_KEY}`,
          "Content-Type": "application/json",
          "Prefer": "return=representation"
        },
        body: JSON.stringify({
          votes: currentVotes + 1
        })
      });

      if (!response.ok) {
        throw new Error("Erro ao votar");
      }

      await loadJudgments();

    } catch (error) {
      console.error(error);
      alert("A cadeira recusou o teu voto.");
    }
  }

  function shareJudgment(index) {
    const j = judgments[index];
    const text = `O Tribunal da Cadeira julgou: ${j.title}. Veredito: ${j.verdict}.`;

    if (navigator.share) {
      navigator.share({
        title: "Tribunal da Cadeira",
        text
      });
    } else {
      navigator.clipboard.writeText(text);
      alert("Texto copiado para partilhar.");
    }
  }

  loadJudgments();
</script>
